<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#121212" />
  <title>Music Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json" />
  <style>
    #song-list::-webkit-scrollbar { width: 4px; }
    #song-list::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    .active { background: rgba(59, 130, 246, 0.2); border-left: 3px solid #3b82f6; }
  </style>
</head>
<body class="bg-[#09090b] text-zinc-100 font-sans">

  <div class="min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-zinc-900 border border-zinc-800 w-full max-w-[380px] rounded-3xl p-6 shadow-2xl">
      
      <div class="flex justify-center mb-6">
        <img id="cover-art" src="plybtn2.png" alt="Cover Art" class="w-56 h-56 object-cover rounded-2xl shadow-lg border border-zinc-800" />
      </div>

      <div class="mb-6">
        <h2 id="now-playing" class="text-xl font-bold truncate">Choose song</h2>
        <div id="song-meta" class="text-xs text-zinc-400 mt-2 space-y-1">
          <p>Artist : <span id="song-artist" class="text-zinc-200">Unknown</span></p>
          <p>Album : <span id="song-album" class="text-zinc-200">Unknown</span></p>
          <p>Genre : <span id="song-genre" class="text-zinc-200 font-medium">Unknown</span></p>
        </div>
      </div>

      <div class="mb-4">
        <input id="seek" type="range" value="0" min="0" max="100" step="0.1" class="w-full h-1.5 bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-blue-500" />
        <div class="flex justify-end mt-2">
           <span id="duration" class="text-[10px] font-mono text-zinc-500">00:00 / 00:00</span>
        </div>
      </div>

      <div class="flex items-center justify-between mb-6 px-2">
        <button id="shuffle" class="text-zinc-500 hover:text-blue-400 transition"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17 17h2v-2h-2v2zm-2-2H6v-2h9v-2l4 3-4 3v-2zm2-6h2V7h-2v2zm-2-2H6v2h9v2l4-3-4-3v2z"/></svg></button>
        <button id="prev" class="text-zinc-200 hover:text-white transition active:scale-90"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6L11 18zm1-12v12l8.5-6L12 6z"/></svg></button>
        
        <button id="play" class="bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-full shadow-lg shadow-blue-900/20 transition active:scale-95">
          <span id="icon-play"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span>
          <span id="icon-pause" style="display:none;"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></span>
        </button>

        <button id="next" class="text-zinc-200 hover:text-white transition active:scale-90"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 24 24"><path d="M13 6v12l8.5-6L13 6zM3 6v12l8.5-6L3 6z"/></svg></button>
        <button id="repeat" class="text-zinc-500 hover:text-blue-400 transition"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H6c-1.66 0-3 1.34-3 3v4h2v-4c0-.55.45-1 1-1zm10 10H6v-3l-4 4 4 4v-3h11c1.66 0 3-1.34 3-3v-4h-2v4c0 .55-.45 1-1 1z"/></svg></button>
      </div>

      <div class="relative mb-4">
        <input type="text" id="search" placeholder="Search songs..." class="w-full bg-zinc-800 border border-zinc-700 rounded-xl py-2 px-4 text-sm focus:outline-none focus:border-blue-500 transition" />
        <button id="clear-search" class="absolute right-3 top-2 text-zinc-500 hover:text-white">✕</button>
      </div>

      <div class="playlist">
        <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3 px-1">Playlist</h3>
        <ul id="song-list" class="space-y-1 max-h-[180px] overflow-y-auto pr-1"></ul>
      </div>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
